title: blank
first_name: Jie
middle_name:
last_name: Liu (刘杰)
description: Jie Liu is an Assistant Professor at Nanjing University working on computer vision, multimodal intelligence, and efficient foundation models.
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with the
  <a href="https://github.com/alshedivat/al-folio" target="_blank">al-folio</a> theme.
  Hosted by <a href="https://pages.github.com/" target="_blank">GitHub Pages</a>.
keywords: computer vision, multimodal learning, image restoration, generative models, Nanjing University
lang: en
icon: 🎓
url: https://njulj.github.io
baseurl: ""
last_updated: true
back_to_top: true

al_folio:
  api_version: 1
  style_engine: tailwind
  tailwind:
    version: 4.1.18
    preflight: false
    css_entry: assets/tailwind/app.css
  distill:
    engine: distillpub-template
    source: al-org-dev/distill-template#al-folio
    allow_remote_loader: true
  features:
    cv:
      enabled: true
    distill:
      enabled: false
  compat:
    bootstrap:
      enabled: true
      support_window: v1.0-v1.2
      deprecates_in: v1.3
      removed_in: v2.0
  upgrade:
    channel: stable
    auto_apply_safe_fixes: false

navbar_fixed: true
footer_fixed: true
search_enabled: false
socials_in_search: false
posts_in_search: false
bib_search: false
max_width: 930px
serve_og_meta: true
serve_schema_org: true
og_image: /images/profile.jpg

analytics:
  google:
baidu_analytics: d5d4cd99e169d41db7f94b7d5b626bd8
google_site_verification:
bing_site_verification:

blog_name: Jie Liu
blog_description: Notes on research and teaching
permalink: /blog/:year/:title/
pagination:
  enabled: false
related_blog_posts:
  enabled: false
giscus:
  repo: njulj/njulj.github.io
  repo_id:
  category: Comments
  category_id:
  mapping: title
  strict: 1
  reactions_enabled: 1
  input_position: bottom
  dark_theme: dark
  light_theme: light
  emit_metadata: 0
  lang: en
newsletter:
  enabled: false

collections:
  news:
    defaults:
      layout: post
    output: true
  projects:
    output: true
  teachings:
    output: true

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

include: ["_pages"]
exclude:
  - bin/
  - docs/
  - Gemfile
  - Gemfile.lock
  - markdown_generator/
  - node_modules/
  - package.json
  - package-lock.json
  - README.md
  - talkmap.ipynb
  - vendor/
keep_files: [CNAME, .nojekyll]

theme: al_folio_core
plugins:
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-link-attributes
  - jekyll-paginate-v2
  - jekyll-sitemap
  - jekyll-socials
  - jemoji
  - al_folio_core
  - al_folio_bootstrap_compat
  - al_icons
  - al_folio_cv
  - al_folio_upgrade
  - al_img_tools
  - al_math

defaults:
  - scope:
      path: assets
    values:
      sitemap: false

sass:
  style: compressed

external_links:
  enabled: true
  rel: external nofollow noopener
  target: _blank

imagemagick:
  enabled: false
lazy_loading_images: true
enable_google_verification: false
enable_bing_verification: false
enable_cookie_consent: false
enable_math: true
enable_tooltips: false
enable_darkmode: true
enable_navbar_social: false
enable_medium_zoom: true
enable_progressbar: true

third_party_libraries:
  download: false
  fontawesome:
    integrity:
      css: "sha256-MVopmdyC2tYTiJ8wlktf0uh0v4NgT+vNdyVFepi7Q0c="
    url:
      css: "https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@{{version}}/css/all.min.css"
    version: "7.2.0"
  academicons:
    integrity:
      css: "sha256-SzrCOBJbGVFMahewkgjwnApaV2+av1DwMAA+/QGLyZw="
    url:
      css: "https://cdn.jsdelivr.net/npm/academicons@{{version}}/css/academicons.min.css"
    version: "1.9.5"
